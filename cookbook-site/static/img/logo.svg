<svg width="36" height="36" viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="neonGrad" x1="0" y1="0" x2="36" y2="36" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#00e5ff"/>
      <stop offset="100%" stop-color="#7c4dff"/>
    </linearGradient>
    <filter id="neonGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="36" height="36" rx="9" fill="#0d1117"/>
  <!-- Border -->
  <rect x="0.75" y="0.75" width="34.5" height="34.5" rx="8.25" stroke="url(#neonGrad)" stroke-width="1.5" opacity="0.6"/>
  <!-- Shield shape -->
  <g filter="url(#neonGlow)">
    <path d="M18 5 L28 9 L28 19 C28 24.5 23.5 29 18 31 C12.5 29 8 24.5 8 19 L8 9 Z"
          stroke="url(#neonGrad)" stroke-width="1.5" fill="none" stroke-linejoin="round"/>
    <!-- Check / tick -->
    <polyline points="13,18 16.5,22 23,14"
              stroke="url(#neonGrad)" stroke-width="2" fill="none"
              stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
